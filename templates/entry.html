<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>录入 - 商品信息管理</title>
        <link href="/static/lib/bootstrap/bootstrap.min.css" rel="stylesheet" />
        <link href="/static/lib/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
        <link href="/static/lib/tabulator/tabulator.min.css" rel="stylesheet" />
        <style>
            body { padding-top: 64px; }
            /* 与查询/编辑页一致的表格与缩略图样式 */
            #todayGrid { height: auto; overflow: visible; }
            .grid-card { padding-bottom: .5rem; }
            .changed { background-color: #e7f5ff !important; }
            .thumb-fixed { width: 80px; height: 60px; object-fit: contain; border-radius: 4px; cursor: pointer; background-color: #fff; display: inline-block; }
            /* 顶部导航：居中+高亮 */
            .navbar .navbar-nav { gap: 1.25rem; }
            .navbar .nav-link { color: rgba(255,255,255,.7); font-weight: 600; }
            .navbar .nav-link.active {
                color: #fff !important;
                background-color: #0d6efd;
                border-radius: .5rem;
                padding: .25rem .85rem;
                box-shadow: 0 0 .6rem rgba(13,110,253,.55);
            }
            .navbar .nav-link:hover { color: #fff; }
            /* 列表不换行，靠外层 .table-responsive 横向滚动 */
            .table-nowrap th, .table-nowrap td { white-space: nowrap; }
            /* 降级表格列宽与输入宽度（与查询/编辑一致的可读性） */
            #fallbackTodayTable { table-layout: auto; }
            #fallbackTodayTable th, #fallbackTodayTable td { min-width: auto; }
            #fallbackTodayTable input.form-control { width: auto !important; box-sizing: content-box; display: inline-block; }
            /* 关键列设置更宽的输入显示 */
            #fallbackTodayTable td:nth-child(2) input,   /* 客户名称 */
            #fallbackTodayTable td:nth-child(3) input,   /* 品名规格 */
            #fallbackTodayTable td:nth-child(4) input,   /* 单位 */
            #fallbackTodayTable td:nth-child(5) input,   /* 数量 */
            #fallbackTodayTable td:nth-child(6) input,   /* 单价 */
            #fallbackTodayTable td:nth-child(11) input,  /* 备注 */
            #fallbackTodayTable td:nth-child(12) input,  /* 运费 */
            #fallbackTodayTable td:nth-child(16) input,  /* 已收款 */
            #fallbackTodayTable td:nth-child(18) input,  /* 结算账户 */
            #fallbackTodayTable td:nth-child(19) input   /* 说明 */
            { min-width: 140px; }
            /* 图片弹框样式（与查询/编辑一致） */
            .image-modal-img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
            .image-modal-body { text-align: center; min-height: 200px; display: flex; align-items: center; justify-content: center; }
            /* 顶部表单：label 与输入同一行并自适应（不换行） */
            #productForm .row.g-3 > [class^="col-"],
            #productForm .row.g-3 > [class*=" col-"] { display: flex; align-items: center; gap: .5rem; }
            /* 统一 label 宽度并右对齐 */
            #productForm .row.g-3 label.form-label { margin-bottom: 0; white-space: nowrap; flex: 0 0 110px; text-align: right; }
            #productForm .row.g-3 .form-control { flex: 1 1 auto; width: auto; min-width: 0; }
            /* 计算属性置灰（readonly） */
            #productForm input[readonly] { background-color: #f8f9fa; color: #6c757d; }
        </style>
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">商品管理</a>
                <div class="navbar-nav mx-auto flex-row">
                    <a class="nav-link" href="/search">查询/导出</a>
                    <a class="nav-link" href="/search-edit">查询/编辑</a>
                    <a class="nav-link active" aria-current="page" href="/entry">录入</a>
                    <a class="nav-link" href="/auth/users">用户管理</a>
                </div>
                <div class="d-flex align-items-center">
                    <span class="text-white-50 me-3">{{ (session.get('real_name') or session.get('username')) or '' }}</span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">退出</button>
                </div>
            </div>
        </nav>

        <div class="container py-4">
            <div class="row g-3">
                <div class="col-12">
                    <div class="bg-white rounded shadow-sm p-3">
                        <form id="productForm" enctype="multipart/form-data" novalidate>
                            <div class="row g-3">
                                <!-- 第1行：单据日期、客户名称、品名规格、单位 -->
                                <div class="col-md-3">
                                    <label class="form-label">单据日期 <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="doc_date" name="doc_date" required />
                                    <div class="invalid-feedback">单据日期不能为空</div>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">客户名称 <span class="text-danger">*</span></label>
                                    <input class="form-control" id="name" name="name" required />
                                    <div class="invalid-feedback">客户名称不能为空</div>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">品名规格 <span class="text-danger">*</span></label>
                                    <input class="form-control" id="product_desc" name="product_desc" required />
                                    <div class="invalid-feedback">品名规格不能为空</div>
                                </div>

                                 <div class="col-md-3">
                                    <label class="form-label">数量 <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="quantity" name="quantity" min="0" value="0" required />
                                    <div class="invalid-feedback">数量必须是大于0的数字</div>
                                </div>
                                <!-- 第2行：单价、数量、单价折扣率、折后单价 -->

                                <div class="col-md-3">
                                    <label class="form-label">单位</label>
                                    <input class="form-control" id="spec" name="spec" />
                                </div>

                                <div class="col-md-3">
                                    <label class="form-label">单价 </label>
                                    <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" value="0" required />
                                </div>
                               
                                <div class="col-md-3">
                                    <label class="form-label">单价折扣率(%)</label>
                                    <input type="number" class="form-control" id="unit_discount_rate" name="unit_discount_rate" step="0.01" value="100" />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">折后单价</label>
                                    <input type="number" class="form-control" id="unit_price_discounted" name="unit_price_discounted" step="0.01" readonly />
                                </div>

                                <!-- 第3行：运费、整单折扣率、折后金额、应收款 -->
                                <div class="col-md-3">
                                    <label class="form-label">运费</label>
                                    <input type="number" class="form-control" id="freight" name="freight" step="0.01" value="0" />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">整单折扣率(%)</label>
                                    <input type="number" class="form-control" id="order_discount_rate" name="order_discount_rate" step="0.01" value="100" />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">折后金额</label>
                                    <input type="number" class="form-control" id="amount_discounted" name="amount_discounted" step="0.01" readonly />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">应收款</label>
                                    <input type="number" class="form-control" id="receivable" name="receivable" step="0.01" readonly />
                                </div>

                                <!-- 第4行：结算账户、本次收款、已收款、尾款 -->
                                <div class="col-md-3">
                                    <label class="form-label">结算账户</label>
                                    <input class="form-control" id="settlement_account" name="settlement_account" />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">已收款</label>
                                    <input type="number" class="form-control" id="paid_total" name="paid_total" step="0.01" value="0" />
                                </div>
                                
                                <div class="col-md-3">
                                    <label class="form-label">备注</label>
                                    <input class="form-control" id="remark" name="remark" />
                                </div>

                                <div class="col-md-3">
                                    <label class="form-label">尾款</label>
                                    <input type="number" class="form-control" id="balance" name="balance" step="0.01" readonly />
                                </div>

                                <!-- 第5行：备注、说明、图片、营业员 -->
                          
                                <div class="col-md-3">
                                    <label class="form-label">说明</label>
                                    <input class="form-control" id="description" name="description" />
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">图片</label>
                                    <input type="file" class="form-control" id="image" name="image" accept="image/*" />
                                </div>
                            </div>
                            <div class="mt-3">
                                <button type="submit" class="btn btn-primary"><i class="bi bi-plus"></i> 添加</button>
                                <button type="button" class="btn btn-outline-secondary" onclick="clearForm()"><i class="bi bi-eraser"></i> 清空</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-12">
                    <div class="bg-white rounded shadow-sm p-3 grid-card">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="mb-0"><i class="bi bi-list"></i> 今日录入（倒序）</h5>
                            <button class="btn btn-outline-secondary btn-sm" onclick="refreshToday()"><i class="bi bi-arrow-clockwise"></i> 刷新</button>
                        </div>
                        <div id="todayGrid"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 编辑模态框复用 -->
        <div class="modal fade" id="editProductModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="bi bi-pencil"></i> 修改商品</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="editProductForm" enctype="multipart/form-data">
                        <div class="modal-body">
                            <input type="hidden" id="editProductId" name="id" />
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">名称 *</label>
                                    <input class="form-control" id="editName" name="name" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">价格 *</label>
                                    <input type="number" step="0.01" min="0" class="form-control" id="editPrice" name="price" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">数量 *</label>
                                    <input type="number" min="0" class="form-control" id="editQuantity" name="quantity" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">规格</label>
                                    <input class="form-control" id="editSpec" name="spec" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">新图片</label>
                                    <input type="file" class="form-control" id="editImage" name="image" accept="image/*" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">当前图片</label>
                                    <div id="currentImageDisplay" class="border rounded p-2 text-center"><span class="text-muted">无图片</span></div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> 保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 图片查看/编辑弹框（与查询/编辑页一致） -->
        <div class="modal fade" id="imageViewerModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">图片预览</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body image-modal-body">
                        <img id="imageModalPreview" class="image-modal-img" alt="预览" />
                        <div id="imageModalEmpty" class="text-muted d-none">当前无图片</div>
                    </div>
                    <div class="modal-footer">
                        <button id="btnModalAddOrChange" type="button" class="btn btn-primary">添加/更换</button>
                        <button id="btnModalDelete" type="button" class="btn btn-outline-danger">删除</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 查看图片模态框 -->
        <div class="modal fade" id="imageViewModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="bi bi-image"></i> 商品图片</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body text-center">
                        <img id="fullSizeImage" src="" alt="商品原图" class="img-fluid" style="max-height: 80vh" />
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                        <a id="downloadImageLink" href="" download class="btn btn-primary"><i class="bi bi-download"></i> 下载图片</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="messageToast" class="toast" role="alert">
                <div class="toast-header">
                    <strong class="me-auto">系统消息</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body" id="toastMessage"></div>
            </div>
        </div>

        <script src="/static/lib/bootstrap/bootstrap.bundle.min.js"></script>
        <script id="tabulator-js" src="/static/lib/tabulator/tabulator.min.js"></script>
        <script>
            let todayGrid = null;
            let useFallback = false;
            const allowedFields = new Set(['doc_date','customer_name','product_desc','unit','quantity','unit_price','unit_discount_rate','remark','freight','order_discount_rate','paid_total','settlement_account','description']);
            let imageModal = null;
            let currentImageRowId = null;

            function toFixed2(x){ const v = Number(x); return Number.isFinite(v) ? v.toFixed(2) : '0.00'; }
            function calcUnitPriceDiscounted(d){ const u=Number(d.unit_price ?? d.price ?? 0); const r=(d.unit_discount_rate==null||d.unit_discount_rate==='')?100:Number(d.unit_discount_rate); return u*((r||100))/100.0; }
            function calcAmount(d){ return calcUnitPriceDiscounted(d) * Number(d.quantity ?? 0); }
            function calcAmountDiscounted(d){ const o=(d.order_discount_rate==null||d.order_discount_rate==='')?100:Number(d.order_discount_rate); return calcAmount(d) * ((o||100))/100.0; }
            function calcReceivable(d){ return calcAmountDiscounted(d) + Number(d.freight ?? 0); }
            function calcBalance(d){ return calcReceivable(d) - Number(d.paid_total ?? 0); }

            function normalizeRow(p){
                return Object.assign({}, p, {
                    unit: (p.unit || p.spec || ''),
                    unit_price: Number(p.unit_price ?? p.price ?? 0)
                });
            }

            function imageFormatter(cell){
                const data = cell.getRow().getData();
                if (!data) return '<span class="text-muted">无</span>';
                if (!data.image_path) {
                    return `<button class="btn btn-sm btn-outline-primary" onclick="openImageModalById(${data.id})">添加图片</button>`;
                }
                return `<img src="/uploads/thumb_${data.image_path}" class="thumb-fixed" onclick="openImageModalById(${data.id})">`;
            }

            function initTodayGrid(){
                if (typeof Tabulator === 'undefined') {
                    useFallback = true;
                    initFallbackGrid();
                    return;
                }
                todayGrid = new Tabulator('#todayGrid', {
                    data: [],
                    layout: 'fitData',
                    index: 'id',
                    reactiveData: false,
                    columnDefaults: { headerHozAlign: 'center', vertAlign: 'middle' },
                    columns: [
                        { title: '单据日期', field: 'doc_date', width: 140, editor: 'input', editorParams: { elementAttributes: { type: 'date' } } },
                        { title: '客户名称', field: 'customer_name', minWidth: 160, editor: 'input' },
                        { title: '品名规格', field: 'product_desc', minWidth: 180, editor: 'input' },
                        { title: '单位', field: 'unit', width: 100, editor: 'input' },
                        { title: '数量', field: 'quantity', width: 100, editor: 'number' },
                        { title: '单价', field: 'unit_price', width: 120, editor: 'number', formatter: function(cell){ return toFixed2(cell.getValue()); } },
                        { title: '单价折扣率(%)', field: 'unit_discount_rate', width: 140, editor: 'number', formatter: function(cell){ return toFixed2(cell.getValue()); } },
                        { title: '折后单价', field: 'unit_price_discounted', width: 120, hozAlign: 'right', formatter: function(cell){ return toFixed2(calcUnitPriceDiscounted(cell.getRow().getData())); } },
                        { title: '金额', field: 'amount', width: 120, hozAlign: 'right', formatter: function(cell){ return toFixed2(calcAmount(cell.getRow().getData())); } },
                        { title: '图片', field: 'image_path', width: 120, hozAlign: 'center', headerSort: false, formatter: imageFormatter },
                        { title: '备注', field: 'remark', minWidth: 160, editor: 'input' },
                        { title: '运费', field: 'freight', width: 120, editor: 'number', formatter: function(cell){ return toFixed2(cell.getValue()); } },
                        { title: '整单折扣率(%)', field: 'order_discount_rate', width: 140, editor: 'number', formatter: function(cell){ return toFixed2(cell.getValue()); } },
                        { title: '折后金额', field: 'amount_discounted', width: 120, hozAlign: 'right', formatter: function(cell){ return toFixed2(calcAmountDiscounted(cell.getRow().getData())); } },
                        { title: '应收款', field: 'receivable', width: 120, hozAlign: 'right', formatter: function(cell){ return toFixed2(calcReceivable(cell.getRow().getData())); } },
                        { title: '已收款', field: 'paid_total', width: 120, editor: 'number', formatter: function(cell){ return toFixed2(cell.getValue()); } },
                        { title: '尾款', field: 'balance', width: 120, hozAlign: 'right', formatter: function(cell){ return toFixed2(calcBalance(cell.getRow().getData())); } },
                        { title: '结算账户', field: 'settlement_account', minWidth: 160, editor: 'input' },
                        { title: '说明', field: 'description', minWidth: 160, editor: 'input' },
                        { title: '营业员', field: 'salesperson', width: 120 },
                        { title: '修改时间', field: 'update_time', width: 160 },
                        { title: '创建时间', field: 'create_time', width: 160 },
                        { title: '操作', field: 'actions', headerSort: false, hozAlign: 'center', formatter: function(cell){
                            const d = cell.getRow().getData();
                            const id = d && d.id != null ? d.id : '';
                            const name = (d && (d.customer_name || d.name)) || '';
                            return `<button class=\"btn btn-outline-danger btn-sm\" onclick=\"deleteProduct(${id}, '${name.replace(/'/g, "\\'")}')\"><i class='bi bi-trash'></i></button>`;
                        }},
                    ],
                    cellEdited: function(cell){
                        const field = cell.getField();
                        if (!allowedFields.has(field)) return;
                        const row = cell.getRow();
                        const id = row.getIndex();
                        let val = cell.getValue();
                        if (typeof val === 'string' && val.trim() === '') val = null;
                        const oldVal = (typeof cell.getOldValue === 'function') ? cell.getOldValue() : undefined;
                        // 先本地刷新计算列
                        const d = row.getData();
                        d[field] = val;
                        try { row.reformat(); } catch(e) {}
                        savePartialUpdate(id, { [field]: val })
                          .then(() => { /* 已本地刷新 */ })
                          .catch(err => {
                              showMessage('保存失败: ' + (err.message || err), 'error');
                              if (oldVal !== undefined) {
                                  const patch = {}; patch[field] = oldVal; row.update(patch);
                                  try { row.reformat(); } catch(e) {}
                              }
                          });
                    }
                });
            }

            function initFallbackGrid(){
                const holder = document.getElementById('todayGrid');
                // 固定列集合（与上面一致）
                const headers = [
                    { key:'doc_date', title:'单据日期' },
                    { key:'customer_name', title:'客户名称' },
                    { key:'product_desc', title:'品名规格' },
                    { key:'unit', title:'单位' },
                    { key:'quantity', title:'数量' },
                    { key:'unit_price', title:'单价' },
                    { key:'unit_discount_rate', title:'单价折扣率(%)' },
                    { key:'unit_price_discounted', title:'折后单价' },
                    { key:'amount', title:'金额' },
                    { key:'image_path', title:'图片' },
                    { key:'remark', title:'备注' },
                    { key:'freight', title:'运费' },
                    { key:'order_discount_rate', title:'整单折扣率(%)' },
                    { key:'amount_discounted', title:'折后金额' },
                    { key:'receivable', title:'应收款' },
                    { key:'paid_total', title:'已收款' },
                    { key:'balance', title:'尾款' },
                    { key:'settlement_account', title:'结算账户' },
                    { key:'description', title:'说明' },
                    { key:'salesperson', title:'营业员' },
                    { key:'update_time', title:'修改时间' },
                    { key:'create_time', title:'创建时间' }
                ];
                const head = headers.map(c => `<th class=\"col-${c.key}\">${c.title}</th>`).join('') + '<th class="col-actions">操作</th>';
                holder.innerHTML = `<div class="table-responsive"><table class="table table-striped align-middle table-nowrap" id="fallbackTodayTable"><thead class="table-dark"><tr>${head}</tr></thead><tbody></tbody></table></div>`;
            }

            function savePartialUpdate(id, fields){
                return fetch('/product/batch_update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: [{ id, fields }] })
                }).then(r => r.json()).then(d => {
                    if (!d || d.success !== true) { throw new Error(d && d.message || '保存失败'); }
                    return d;
                });
            }

            function gridReplaceData(rows){
                if (!useFallback) { if (todayGrid) todayGrid.replaceData(rows); return; }
                const tbody = document.querySelector('#fallbackTodayTable tbody');
                if (!tbody) return;
                tbody.innerHTML = '';
                rows.forEach(d => {
                    const tr = document.createElement('tr');
                    tr.setAttribute('data-id', d.id);
                    const imgHtml = d.image_path ? `<img src="/uploads/thumb_${d.image_path}" class="thumb-fixed" onclick="openImageModalById(${d.id})">` : `<button class=\"btn btn-sm btn-outline-primary\" onclick=\"openImageModalById(${d.id})\">添加图片</button>`;
                    const cellMap = {
                        doc_date: `<input class=\"form-control form-control-sm\" type=\"date\" data-field=\"doc_date\" value=\"${(d.doc_date||'').slice(0,10)}\">`,
                        customer_name: `<input class=\"form-control form-control-sm\" data-field=\"customer_name\" value=\"${(d.customer_name||d.name||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}\">`,
                        product_desc: `<input class=\"form-control form-control-sm\" data-field=\"product_desc\" value=\"${(d.product_desc||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}\">`,
                        unit: `<input class=\"form-control form-control-sm\" data-field=\"unit\" value=\"${(d.unit||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}\">`,
                        quantity: `<input class=\"form-control form-control-sm\" type=\"number\" data-field=\"quantity\" value=\"${Number(d.quantity||0)}\">`,
                        unit_price: `<input class=\"form-control form-control-sm\" type=\"number\" step=\"0.01\" data-field=\"unit_price\" value=\"${Number(d.unit_price||0)}\">`,
                        unit_discount_rate: `<input class=\"form-control form-control-sm\" type=\"number\" step=\"0.01\" data-field=\"unit_discount_rate\" value=\"${Number(d.unit_discount_rate==null?100:d.unit_discount_rate)}\">`,
                        unit_price_discounted: toFixed2(calcUnitPriceDiscounted(d)),
                        amount: toFixed2(calcAmount(d)),
                        image_path: imgHtml,
                        remark: `<input class=\"form-control form-control-sm\" data-field=\"remark\" value=\"${(d.remark||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}\">`,
                        freight: `<input class=\"form-control form-control-sm\" type=\"number\" step=\"0.01\" data-field=\"freight\" value=\"${Number(d.freight||0)}\">`,
                        order_discount_rate: `<input class=\"form-control form-control-sm\" type=\"number\" step=\"0.01\" data-field=\"order_discount_rate\" value=\"${Number(d.order_discount_rate==null?100:d.order_discount_rate)}\">`,
                        amount_discounted: toFixed2(calcAmountDiscounted(d)),
                        receivable: toFixed2(calcReceivable(d)),
                        paid_total: `<input class=\"form-control form-control-sm\" type=\"number\" step=\"0.01\" data-field=\"paid_total\" value=\"${Number(d.paid_total||0)}\">`,
                        balance: toFixed2(calcBalance(d)),
                        settlement_account: `<input class=\"form-control form-control-sm\" data-field=\"settlement_account\" value=\"${(d.settlement_account||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}\">`,
                        description: `<input class=\"form-control form-control-sm\" data-field=\"description\" value=\"${(d.description||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}\">`,
                        salesperson: (d.salesperson||''),
                        update_time: (d.update_time||''),
                        create_time: (d.create_time||'')
                    };
                    const order = ['doc_date','customer_name','product_desc','unit','quantity','unit_price','unit_discount_rate','unit_price_discounted','amount','image_path','remark','freight','order_discount_rate','amount_discounted','receivable','paid_total','balance','settlement_account','description','salesperson','update_time','create_time'];
                    const tds = order.map(k => `<td class=\"col-${k}\">${cellMap[k]||''}</td>`).join('');
                    const ops = `<td class=\"col-actions\"><button class=\"btn btn-outline-danger btn-sm\" onclick=\"deleteProduct(${d.id}, '${String(d.customer_name||d.name||'').replace(/'/g,"\\'")}')\"><i class='bi bi-trash'></i></button></td>`;
                    tr.innerHTML = tds + ops;
                    tbody.appendChild(tr);
                });
                // 绑定保存
                tbody.querySelectorAll('input[data-field]').forEach(inp => {
                    inp.addEventListener('change', function(e){
                        const tr = e.target.closest('tr');
                        const id = Number(tr.getAttribute('data-id'));
                        const field = e.target.getAttribute('data-field');
                        if (!allowedFields.has(field)) return;
                        let val = e.target.value;
                        if (e.target.type === 'number') val = (val === '' ? null : Number(val));
                        if (e.target.type === 'date') val = val || null;
                        // 先刷新计算列
                        const d = {};
                        d[field] = val;
                        refreshFallbackComputed(tr, id, d);
                        savePartialUpdate(id, { [field]: val })
                          .then(() => {})
                          .catch(err => { showMessage('保存失败: ' + (err.message||err), 'error'); });
                    });
                });
            }

            function refreshFallbackComputed(tr, id, patch){
                try{
                    // 从当前行DOM读取必要值
                    const getVal = (cls, t='text') => {
                        const td = tr.querySelector('td.col-'+cls);
                        if (!td) return null;
                        const input = td.querySelector('input');
                        if (!input) return td.textContent;
                        if (input.type === 'number') return Number(input.value||0);
                        return input.value || null;
                    };
                    const data = {
                        unit_price: Number(getVal('unit_price') ?? 0),
                        unit_discount_rate: Number(getVal('unit_discount_rate') ?? 100),
                        quantity: Number(getVal('quantity') ?? 0),
                        order_discount_rate: Number(getVal('order_discount_rate') ?? 100),
                        freight: Number(getVal('freight') ?? 0),
                        paid_total: Number(getVal('paid_total') ?? 0)
                    };
                    Object.assign(data, patch||{});
                    const upd = (cls, v) => { const td = tr.querySelector('td.col-'+cls); if (td) td.textContent = toFixed2(v); };
                    upd('unit_price_discounted', calcUnitPriceDiscounted(data));
                    upd('amount', calcAmount(data));
                    upd('amount_discounted', calcAmountDiscounted(data));
                    upd('receivable', calcReceivable(data));
                    upd('balance', calcBalance(data));
                }catch(e){}
            }
            document.addEventListener('DOMContentLoaded', function () {
                document.getElementById('productForm').addEventListener('submit', function (e) {
                    e.preventDefault();
                    if (!validateForm()) { return; }
                    addProduct();
                });
                document.getElementById('editProductForm').addEventListener('submit', function (e) {
                    e.preventDefault();
                    updateProduct();
                });
                // 默认日期
                const dd = document.getElementById('doc_date');
                // 使用本地时区，避免 toISOString 带来的跨天问题
                if (dd) {
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    dd.value = now.toISOString().slice(0, 10);
                }
                // 绑定计算
                ['quantity','price','unit_discount_rate','order_discount_rate','freight','paid_total']
                    .forEach(id => document.getElementById(id)?.addEventListener('input', recalc));
                recalc();
                initTodayGrid();
                refreshToday();
                // 初始化图片弹框
                const modalEl = document.getElementById('imageViewerModal');
                if (modalEl) {
                    imageModal = new bootstrap.Modal(modalEl);
                    document.getElementById('btnModalAddOrChange')?.addEventListener('click', () => {
                        if (currentImageRowId == null) return;
                        triggerImagePick(currentImageRowId);
                    });
                    document.getElementById('btnModalDelete')?.addEventListener('click', () => {
                        if (currentImageRowId == null) return;
                        deleteImageFromModal(currentImageRowId);
                    });
                }
            });

            function addProduct() {
                const formData = new FormData(document.getElementById('productForm'));
                fetch('/product/add', { method: 'POST', body: formData })
                    .then(r => r.json())
                    .then(d => {
                        if (d.success) {
                            showMessage(d.message, 'success');
                            refreshToday();
                        } else showMessage(d.message, 'error');
                    })
                    .catch(err => showMessage('添加失败: ' + err.message, 'error'));
            }

            function clearForm() {
                const form = document.getElementById('productForm');
                if (!form) return;
                form.reset();
                const imgInput = document.getElementById('image');
                if (imgInput) { imgInput.value = ''; }
                // 重新设置默认日期
                const dd = document.getElementById('doc_date');
                if (dd) {
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    dd.value = now.toISOString().slice(0, 10);
                }
                recalc();
            }

            function markInvalid(el, invalid) {
                if (!el) return;
                if (invalid) {
                    el.classList.add('is-invalid');
                } else {
                    el.classList.remove('is-invalid');
                }
            }

            function validateForm() {
                let ok = true;
                const docDate = document.getElementById('doc_date');
                const name = document.getElementById('name');
                const productDesc = document.getElementById('product_desc');
                const quantity = document.getElementById('quantity');
                const price = document.getElementById('price');

                markInvalid(docDate, !docDate.value);
                ok = ok && !!docDate.value;

                markInvalid(name, !name.value.trim());
                ok = ok && !!name.value.trim();

                markInvalid(productDesc, !productDesc.value.trim());
                ok = ok && !!productDesc.value.trim();

                markInvalid(quantity, quantity.value === '' || Number.isNaN(Number(quantity.value)) || Number(quantity.value) < 0);
                ok = ok && !(quantity.value === '' || Number.isNaN(Number(quantity.value)) || Number(quantity.value) < 0);

                markInvalid(price, price.value === '' || Number.isNaN(Number(price.value)) || Number(price.value) < 0);
                ok = ok && !(price.value === '' || Number.isNaN(Number(price.value)) || Number(price.value) < 0);

                return ok;
            }

            function refreshToday() {
                // 直接拉取第一页数据，前端过滤当天
                fetch('/product/list?page=1&per_page=200')
                    .then(r => r.json())
                    .then(d => {
                        if (!d.success) return showMessage(d.message, 'error');
                        const today = new Date().toISOString().slice(0, 10);
                        const rows = (d.data.products || []).filter(p => (p.create_time || '').slice(0,10) === today);
                        rows.sort((a,b) => (b.create_time || '').localeCompare(a.create_time || ''));
                        gridReplaceData(rows.map(normalizeRow));
                    })
                    .catch(err => showMessage('加载今日数据失败: ' + err.message, 'error'));
            }

            // 旧的静态渲染函数已被可编辑表格替代

            function recalc() {
                const qty = Number(document.getElementById('quantity')?.value || 0);
                const unitPrice = Number(document.getElementById('price')?.value || 0);
                const unitRate = Number(document.getElementById('unit_discount_rate')?.value || 100);
                const orderRate = Number(document.getElementById('order_discount_rate')?.value || 100);
                const freight = Number(document.getElementById('freight')?.value || 0);
                const paidTotal = Number(document.getElementById('paid_total')?.value || 0);

                const unitPriceDiscounted = unitPrice * unitRate / 100.0;
                const amount = unitPriceDiscounted * qty;
                const amountDiscounted = amount * orderRate / 100.0;
                const receivable = amountDiscounted + freight;
                const balance = receivable - paidTotal;

                const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
                set('unit_price_discounted', unitPriceDiscounted.toFixed(2));
                set('amount', amount.toFixed(2));
                set('amount_discounted', amountDiscounted.toFixed(2));
                set('receivable', receivable.toFixed(2));
                set('balance', balance.toFixed(2));
            }

            function editProduct(id, name, price, quantity, spec, imagePath) {
                document.getElementById('editProductId').value = id;
                document.getElementById('editName').value = name;
                document.getElementById('editPrice').value = price;
                document.getElementById('editQuantity').value = quantity;
                document.getElementById('editSpec').value = spec || '';
                const current = document.getElementById('currentImageDisplay');
                current.innerHTML = imagePath ? `<img src="/uploads/thumb_${imagePath}" class="product-image" onclick="viewImage('/uploads/${imagePath}')">` : '<span class="text-muted">无图片</span>';
                new bootstrap.Modal(document.getElementById('editProductModal')).show();
            }

            // ===== 图片增删改（与查询/编辑页一致的 API） =====
            function openImageModalById(id){
                currentImageRowId = id;
                const data = getRowData(id);
                const imgEl = document.getElementById('imageModalPreview');
                const emptyEl = document.getElementById('imageModalEmpty');
                if (!imgEl || !emptyEl || !imageModal) return;
                if (data && data.image_path) {
                    imgEl.src = `/uploads/${data.image_path}`;
                    imgEl.classList.remove('d-none');
                    emptyEl.classList.add('d-none');
                    document.getElementById('btnModalAddOrChange').textContent = '更换图片';
                    document.getElementById('btnModalDelete').classList.remove('d-none');
                } else {
                    imgEl.src = '';
                    imgEl.classList.add('d-none');
                    emptyEl.classList.remove('d-none');
                    document.getElementById('btnModalAddOrChange').textContent = '添加图片';
                    document.getElementById('btnModalDelete').classList.add('d-none');
                }
                imageModal.show();
            }

            function getRowData(id){
                if (!useFallback && todayGrid) {
                    const row = todayGrid.getRow(id);
                    return row ? row.getData() : null;
                }
                const tr = document.querySelector(`#fallbackTodayTable tr[data-id="${id}"]`);
                if (!tr) return null;
                // 仅需 image_path 及少量字段
                const img = tr.querySelector('td.col-image_path img');
                return { id, image_path: img ? (img.getAttribute('src')||'').replace('/uploads/thumb_','') : null };
            }

            function setRowImagePath(id, filename){
                if (!useFallback && todayGrid) {
                    const row = todayGrid.getRow(id);
                    if (row) {
                        row.update({ image_path: filename || null });
                        if (typeof row.reformat === 'function') { try { row.reformat(); } catch(e) {} }
                    }
                    return;
                }
                const tr = document.querySelector(`#fallbackTodayTable tr[data-id="${id}"]`);
                if (!tr) return;
                const td = tr.querySelector('td.col-image_path');
                if (!td) return;
                if (filename) {
                    td.innerHTML = `<img src="/uploads/thumb_${filename}" class="thumb-fixed" onclick="openImageModalById(${id})">`;
                } else {
                    td.innerHTML = `<button class="btn btn-sm btn-outline-primary" onclick="openImageModalById(${id})">添加图片</button>`;
                }
            }

            function triggerImagePick(id){
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = () => {
                    const file = input.files && input.files[0];
                    if (!file) return;
                    const fd = new FormData();
                    fd.append('id', String(id));
                    fd.append('image', file);
                    fetch('/product/update_image', { method: 'POST', body: fd })
                      .then(r => r.json())
                      .then(d => {
                          if (!d.success) return showMessage(d.message || '图片更新失败', 'error');
                          showMessage('图片更新成功', 'success');
                          setRowImagePath(id, d.filename || null);
                          if (imageModal) openImageModalById(id);
                      })
                      .catch(err => showMessage('图片更新失败: ' + err.message, 'error'));
                };
                input.click();
            }

            function deleteImageFromModal(id){
                if (!confirm('确定删除该行图片？')) return;
                const fd = new FormData();
                fd.append('id', String(id));
                fd.append('delete_image', '1');
                fetch('/product/update_image', { method: 'POST', body: fd })
                  .then(r => r.json())
                  .then(d => {
                      if (!d.success) return showMessage(d.message || '删除失败', 'error');
                      showMessage('图片已删除', 'success');
                      setRowImagePath(id, null);
                      if (imageModal) openImageModalById(id);
                  })
                  .catch(err => showMessage('删除失败: ' + err.message, 'error'));
            }

            function deleteProduct(id, name) {
                if (!confirm(`确定删除商品"${name}"？`)) return;
                fetch('/product/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                })
                    .then(r => r.json())
                    .then(d => {
                        if (d.success) { showMessage(d.message, 'success'); refreshToday(); }
                        else showMessage(d.message, 'error');
                    })
                    .catch(err => showMessage('删除失败: ' + err.message, 'error'));
            }

            function updateProduct() {
                const formData = new FormData(document.getElementById('editProductForm'));
                fetch('/product/update', { method: 'POST', body: formData })
                    .then(r => r.json())
                    .then(d => {
                        if (d.success) {
                            showMessage(d.message, 'success');
                            bootstrap.Modal.getInstance(document.getElementById('editProductModal')).hide();
                            refreshToday();
                        } else showMessage(d.message, 'error');
                    })
                    .catch(err => showMessage('更新失败: ' + err.message, 'error'));
            }

            function viewImage(imageUrl) {
                const img = document.getElementById('fullSizeImage');
                const link = document.getElementById('downloadImageLink');
                img.src = '';
                img.alt = '加载中...';
                img.style.opacity = '0.5';
                img.src = imageUrl;
                link.href = imageUrl;
                img.onload = function () { img.style.opacity = '1'; img.alt = '商品原图'; };
                img.onerror = function () { img.alt = '图片加载失败'; img.style.opacity = '0.3'; showMessage('图片加载失败', 'error'); };
                new bootstrap.Modal(document.getElementById('imageViewModal')).show();
            }

            function showMessage(message, type = 'info') {
                const toast = document.getElementById('messageToast');
                const toastMessage = document.getElementById('toastMessage');
                toastMessage.textContent = message;
                toast.classList.remove('bg-success', 'bg-danger', 'bg-warning', 'bg-info');
                switch (type) {
                    case 'success': toast.classList.add('bg-success', 'text-white'); break;
                    case 'error': toast.classList.add('bg-danger', 'text-white'); break;
                    case 'warning': toast.classList.add('bg-warning'); break;
                    default: toast.classList.add('bg-info', 'text-white');
                }
                new bootstrap.Toast(toast).show();
            }

            function logout() {
                fetch('/auth/logout', { method: 'POST' })
                    .then(r => r.json())
                    .then(() => { window.location.href = '/auth/login'; })
                    .catch(() => { window.location.href = '/auth/login'; });
            }
        </script>
    </body>
</html>
